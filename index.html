<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS CI/CD Lab</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-image: linear-gradient(135deg, #2c3e50, #fd746c);
        color: white;
        height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .container {
        background: rgba(255, 255, 255, 0.1);
        padding: 50px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 3rem;
      }
      p {
        font-size: 1.2rem;
        opacity: 0.8;
      }
      .badge {
        background-color: #ff9900;
        padding: 5px 10px;
        border-radius: 5px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>AWS CI/CD Pipeline 🚀</h1>
      <p>
        Status:
        <span class="badge" style="background-color: #2ecc71"
          >Wersja 2.0 - Sukces CI/CD! 🟢</span
        >
      </p>
      <p>Wdrożono w pełni automatycznie za pomocą CodePipeline.</p>
    </div>
  </body>
</html>
